  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x; flex-direction:column; background:linear-gradient(180deg,#FCF8EF 0%, #F5ECDC 100%); color:#2A211A; overflow:hidden;\">\n\n      <!-- ===================== SCREEN 1 · RATING ===================== -->\n      <sc-if value=\"{{ isRating }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"height:100%; display:flex; flex-direction:column; animation:scrFade .32s ease both;\">\n          <div style=\"height:60px; flex:none;\"><\u002Fdiv>\n\n          <div style=\"padding:0 16px; flex:none;\">\n            <div style=\"position:relative; border-radius:26px; box-shadow:0 16px 34px rgba(74,50,18,0.16); overflow:hidden;\">\n              <image-slot id=\"rating-hero\" shape=\"rounded\" radius=\"26\" placeholder=\"Drop interior / dish photo\" style=\"width:100%; height:178px; display:block;\"><\u002Fimage-slot>\n              <div style=\"position:absolute; left:0; right:0; bottom:0; height:64px; background:linear-gradient(180deg, rgba(40,25,8,0) 0%, rgba(40,25,8,0.34) 100%); pointer-events:none;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; justify-content:center; margin-top:-44px; position:relative; z-index:2;\">\n            <div style=\"width:92px; height:92px; border-radius:50%; background:#FFFDF8; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(74,50,18,0.20);\">\n              <image-slot id=\"rating-logo\" shape=\"circle\" placeholder=\"Logo\" style=\"width:80px; height:80px; display:block;\"><\u002Fimage-slot>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"text-align:center; margin-top:13px; padding:0 24px; flex:none;\">\n            <div style=\"font-family:'Marcellus',serif; font-size:28px; line-height:1.05; letter-spacing:0.4px;\">Spice Garden<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:center; gap:5px; margin-top:7px; color:#9A8C7A; font-size:13px; font-weight:500;\">\n              <span style=\"{{ pinStyle }}\"><svg width=\"11\" height=\"13\" viewBox=\"0 0 12 14\"><path d=\"M6 0C2.7 0 0 2.6 0 5.9 0 10 6 14 6 14s6-4 6-8.1C12 2.6 9.3 0 6 0z\" fill=\"currentColor\"><\u002Fpath><circle cx=\"6\" cy=\"5.8\" r=\"2.1\" fill=\"#FCF8EF\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n              Jubilee Hills, Hyderabad\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"text-align:center; margin-top:24px; padding:0 30px; flex:none;\">\n            <div style=\"font-size:22px; font-weight:800; line-height:1.25; letter-spacing:-0.2px; text-wrap:balance;\">How was your experience?<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9A8C7A; margin-top:8px; line-height:1.45; font-weight:500; text-wrap:pretty;\">Tell us how we did — it only takes a second.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:30px; padding:0 22px; flex:none;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n              <sc-for list=\"{{ emojis }}\" as=\"e\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex; flex-direction:column; align-items:center; flex:none;\">\n                  <button style=\"{{ e.chipStyle }}\" onclick=\"{{ e.onSelect }}\">{{ e.glyph }}<\u002Fbutton>\n                  <div style=\"{{ e.labelStyle }}\">{{ e.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1; min-height:24px;\"><\u002Fdiv>\n\n          <div style=\"padding:0 22px 30px; flex:none;\">\n            <button style=\"{{ ctaStyle }}\" onclick=\"{{ onContinue }}\">{{ ctaText }}<\u002Fbutton>\n            <sc-if value=\"{{ secureNote }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; align-items:center; justify-content:center; gap:6px; margin-top:16px; color:#B0A28E; font-size:11px; font-weight:600; letter-spacing:0.2px;\">\n                <svg width=\"10\" height=\"12\" viewBox=\"0 0 12 14\"><rect x=\"1\" y=\"6\" width=\"10\" height=\"7\" rx=\"1.6\" fill=\"#B0A28E\"><\u002Frect><path d=\"M3.2 6V4.2a2.8 2.8 0 0 1 5.6 0V6\" fill=\"none\" stroke=\"#B0A28E\" stroke-width=\"1.4\"><\u002Fpath><\u002Fsvg>\n                Private &amp; secure · Powered by Votica\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== SCREEN 2 · SURVEY (happy) ===================== -->\n      <sc-if value=\"{{ isSurvey }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:100%; display:flex; flex-direction:column; animation:scrFade .32s ease both;\">\n          <div style=\"height:56px; flex:none;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:12px; padding:6px 18px 0; flex:none;\">\n            <button style=\"{{ backStyle }}\" onclick=\"{{ onBack }}\">‹<\u002Fbutton>\n            <div style=\"font-size:13px; font-weight:700; color:#9A8C7A; letter-spacing:0.3px;\">STEP 2 OF 3<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:18px 24px 0; flex:none;\">\n            <div style=\"font-size:23px; font-weight:800; line-height:1.2; letter-spacing:-0.3px; text-wrap:balance;\">Wonderful! What stood out?<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9A8C7A; margin-top:7px; font-weight:500;\">Tap a few — we'll turn them into a review.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:22px 22px 0; flex:1; overflow:auto; display:flex; flex-direction:column; gap:20px;\">\n            <sc-for list=\"{{ surveyGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n              <div>\n                <div style=\"font-size:12px; font-weight:700; color:#B0A28E; letter-spacing:0.6px; text-transform:uppercase; margin-bottom:11px;\">{{ grp.title }}<\u002Fdiv>\n                <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n                  <sc-for list=\"{{ grp.chips }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <button style=\"{{ c.style }}\" onclick=\"{{ c.onToggle }}\">{{ c.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 22px 30px; flex:none;\">\n            <button style=\"{{ genStyle }}\" onclick=\"{{ onGenerate }}\">{{ genText }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== SCREEN 3 · REVIEW READY (happy) ===================== -->\n      <sc-if value=\"{{ isReview }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:100%; display:flex; flex-direction:column; animation:scrFade .32s ease both;\">\n          <div style=\"height:56px; flex:none;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:12px; padding:6px 18px 0; flex:none;\">\n            <button style=\"{{ backStyle }}\" onclick=\"{{ onBackToSurvey }}\">‹<\u002Fbutton>\n            <div style=\"font-size:13px; font-weight:700; color:#9A8C7A; letter-spacing:0.3px;\">STEP 3 OF 3<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:20px 26px 0; flex:none; text-align:center;\">\n            <div style=\"width:60px; height:60px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center; {{ checkBg }}\">\n              <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4 10-11\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:22px; font-weight:800; margin-top:16px; letter-spacing:-0.3px;\">Your review is ready<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9A8C7A; margin-top:7px; font-weight:500;\">Copied to your clipboard automatically.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:22px 22px 0; flex:1; overflow:auto;\">\n            <div style=\"background:#FFFDF8; border:1px solid #EBDFCB; border-radius:18px; padding:18px; box-shadow:0 10px 26px rgba(74,50,18,0.08);\">\n              <div style=\"display:flex; align-items:center; gap:10px;\">\n                <image-slot id=\"review-avatar\" shape=\"circle\" placeholder=\"\" style=\"width:38px; height:38px; display:block; flex:none;\"><\u002Fimage-slot>\n                <div>\n                  <div style=\"font-size:14px; font-weight:700;\">Spice Garden<\u002Fdiv>\n                  <div style=\"font-size:15px; letter-spacing:2px; color:#E8A33D; margin-top:1px;\">★★★★★<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.6; color:#4A3B2C; margin-top:13px; font-weight:500;\">{{ reviewText }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:center; gap:6px; margin-top:14px; color:#9A8C7A; font-size:12px; font-weight:600;\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><rect x=\"8\" y=\"8\" width=\"11\" height=\"13\" rx=\"2\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Frect><path d=\"M5 16V4a1 1 0 0 1 1-1h9\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n              Copied — just paste &amp; post\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 22px 30px; flex:none;\">\n            <button style=\"{{ googleStyle }}\" onclick=\"{{ onRestart }}\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 48 48\"><path fill=\"#FFF\" d=\"M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z\"><\u002Fpath><\u002Fsvg>\n              Open Google to post\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== SCREEN 2' · COMPLAINT (friction) ===================== -->\n      <sc-if value=\"{{ isComplaint }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:100%; display:flex; flex-direction:column; animation:scrFade .32s ease both;\">\n          <div style=\"height:56px; flex:none;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:12px; padding:6px 18px 0; flex:none;\">\n            <button style=\"{{ backStyle }}\" onclick=\"{{ onBack }}\">‹<\u002Fbutton>\n            <div style=\"font-size:13px; font-weight:700; color:#9A8C7A; letter-spacing:0.3px;\">PRIVATE FEEDBACK<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:18px 26px 0; flex:none; text-align:center;\">\n            <div style=\"font-size:38px; line-height:1;\">🙏<\u002Fdiv>\n            <div style=\"font-size:22px; font-weight:800; margin-top:12px; line-height:1.2; letter-spacing:-0.3px; text-wrap:balance;\">We're sorry we missed the mark<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#9A8C7A; margin-top:8px; font-weight:500; line-height:1.45; text-wrap:pretty;\">Tell us what went wrong — this goes straight to the manager, privately.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:22px 22px 0; flex:1; display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n              <sc-for list=\"{{ issueChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <button style=\"{{ c.style }}\" onclick=\"{{ c.onToggle }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"flex:1; background:#FFFDF8; border:1px solid #EBDFCB; border-radius:16px; padding:14px; color:#B0A28E; font-size:14px; font-weight:500; line-height:1.5;\">Add any details (optional)…<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:14px 22px 30px; flex:none;\">\n            <button style=\"{{ sendStyle }}\" onclick=\"{{ onSend }}\">Send privately to the manager<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== SCREEN 3' · SENT (friction) ===================== -->\n      <sc-if value=\"{{ isSent }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 34px; text-align:center; animation:scrFade .32s ease both;\">\n          <div style=\"width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; {{ checkBg }}\">\n            <svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 13l4 4 10-11\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:24px; font-weight:800; margin-top:22px; letter-spacing:-0.3px; text-wrap:balance;\">Sent to the manager<\u002Fdiv>\n          <div style=\"font-size:14px; color:#9A8C7A; margin-top:10px; font-weight:500; line-height:1.5; text-wrap:pretty;\">Thank you for telling us — we'll make this right. Someone will reach out shortly.<\u002Fdiv>\n          <button style=\"{{ doneStyle }}\" onclick=\"{{ onRestart }}\">Done<\u002Fbutton>\n          <div style=\"font-size:12px; color:#C2B5A1; margin-top:18px; font-weight:600; max-width:230px; line-height:1.5; text-decoration:underline; cursor:pointer;\">Still want to post publicly on Google?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n  <\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 482, &quot;height&quot;: 940 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Saffron&quot;, &quot;Emerald&quot;, &quot;Indigo&quot;, &quot;Rosewood&quot;], &quot;default&quot;: &quot;Saffron&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showLabels&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;secureNote&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'rating',\n    selected: null,\n    love: {}, issues: {},\n  };\n\n  hexA(h, a) {\n    const n = parseInt(h.slice(1), 16);\n    return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${a})`;\n  }\n\n  toggle(key, val) {\n    this.setState(s => {\n      const m = { ...s[key] };\n      m[val] = !m[val];\n      return { [key]: m };\n    });\n  }\n\n  renderVals() {\n    const ACCENTS = { Saffron: '#DD7A2E', Emerald: '#1F8A5B', Indigo: '#4F63C9', Rosewood: '#B0476A' };\n    const accent = ACCENTS[this.props.accent] || ACCENTS.Saffron;\n    const showLabels = this.props.showLabels ?? true;\n    const secureNote = this.props.secureNote ?? true;\n    const sel = this.state.selected;\n    const scr = this.state.screen;\n\n    // ---- emoji rating ----\n    const base = [\n      { g: '😠', l: 'Awful', s: 1 },\n      { g: '🙁', l: 'Poor', s: 2 },\n      { g: '😐', l: 'Okay', s: 3 },\n      { g: '😊', l: 'Good', s: 4 },\n      { g: '😍', l: 'Loved it', s: 5 },\n    ];\n    const emojis = base.map((e) => {\n      const on = sel === e.s;\n      return {\n        glyph: e.g, label: e.l,\n        chipStyle: {\n          width: '58px', height: '58px', borderRadius: '50%',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: '29px', padding: '0', cursor: 'pointer', flex: 'none', outline: 'none',\n          border: on ? `2px solid ${accent}` : '2px solid transparent',\n          background: on ? '#ffffff' : '#F4EDE1',\n          transform: on ? 'translateY(-6px) scale(1.12)' : 'none',\n          boxShadow: on ? `0 12px 24px ${this.hexA(accent, 0.32)}` : '0 1px 2px rgba(0,0,0,0.04)',\n          transition: 'transform .24s cubic-bezier(.2,.85,.25,1), box-shadow .24s, background .24s, border-color .24s',\n          WebkitTapHighlightColor: 'transparent',\n        },\n        labelStyle: {\n          fontSize: '11px', marginTop: '10px',\n          fontWeight: on ? '800' : '600',\n          color: on ? '#3A2D20' : '#A99B89',\n          letterSpacing: '0.2px', transition: 'color .2s',\n          display: showLabels ? 'block' : 'none',\n        },\n        onSelect: () => this.setState({ selected: e.s }),\n      };\n    });\n\n    const has = sel != null;\n    const primaryBtn = (active, bg) => ({\n      width: '100%', height: '56px', border: 'none', borderRadius: '16px',\n      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '10px',\n      fontFamily: 'Manrope, sans-serif', fontSize: '16px', fontWeight: '800', letterSpacing: '0.2px',\n      cursor: active ? 'pointer' : 'default',\n      color: active ? '#fff' : '#B6A892',\n      background: active ? bg : '#EFE7D9',\n      boxShadow: active ? `0 12px 26px ${this.hexA(bg, 0.30)}` : 'none',\n      transition: 'all .25s', WebkitTapHighlightColor: 'transparent',\n    });\n\n    const backStyle = {\n      width: '38px', height: '38px', borderRadius: '50%', border: '1px solid #EBDFCB',\n      background: '#FFFDF8', color: '#6B5B49', fontSize: '22px', fontWeight: '700',\n      lineHeight: '1', cursor: 'pointer', display: 'flex', alignItems: 'center',\n      justifyContent: 'center', paddingBottom: '3px', flex: 'none', outline: 'none',\n    };\n\n    const chip = (mapKey, label) => {\n      const on = !!this.state[mapKey][label];\n      return {\n        label,\n        style: {\n          padding: '10px 16px', borderRadius: '13px', fontFamily: 'Manrope, sans-serif',\n          fontSize: '14px', fontWeight: '700', cursor: 'pointer', outline: 'none',\n          border: on ? `1.5px solid ${accent}` : '1.5px solid #E6DAC6',\n          background: on ? this.hexA(accent, 0.12) : '#FFFDF8',\n          color: on ? accent : '#5B4D3D',\n          transition: 'all .18s', WebkitTapHighlightColor: 'transparent',\n        },\n        onToggle: () => this.toggle(mapKey, label),\n      };\n    };\n\n    const surveyGroups = [\n      { title: 'What you loved', chips: ['The food', 'The service', 'The ambience', 'Great value'].map(l => chip('love', l)) },\n      { title: 'Dishes', chips: ['Biryani', 'Kebabs', 'Haleem', 'Dessert'].map(l => chip('love', l)) },\n      { title: 'The vibe', chips: ['Cozy', 'Lively', 'Family-friendly', 'Romantic'].map(l => chip('love', l)) },\n    ];\n    const issueChips = ['Slow service', 'Cold food', 'Order wrong', 'Cleanliness', 'Pricing', 'Staff attitude'].map(l => chip('issues', l));\n\n    const loveCount = Object.values(this.state.love).filter(Boolean).length;\n\n    return {\n      // screen flags\n      isRating: scr === 'rating',\n      isSurvey: scr === 'survey',\n      isReview: scr === 'review',\n      isComplaint: scr === 'complaint',\n      isSent: scr === 'sent',\n\n      // rating\n      emojis,\n      ctaText: has ? 'Continue' : 'Tap a face above',\n      ctaStyle: primaryBtn(has, accent),\n      pinStyle: { color: accent, display: 'inline-flex' },\n      secureNote,\n      onContinue: () => { if (has) this.setState({ screen: sel >= 3 ? 'survey' : 'complaint' }); },\n\n      // shared\n      backStyle,\n      onBack: () => this.setState({ screen: 'rating' }),\n      onBackToSurvey: () => this.setState({ screen: 'survey' }),\n      checkBg: { background: `linear-gradient(135deg, ${accent}, ${this.hexA(accent, 0.78)})`, boxShadow: `0 14px 30px ${this.hexA(accent, 0.34)}` },\n\n      // survey\n      surveyGroups,\n      genText: loveCount ? `Generate my review (${loveCount})` : 'Pick a few to continue',\n      genStyle: primaryBtn(loveCount > 0, accent),\n      onGenerate: () => { if (loveCount) this.setState({ screen: 'review' }); },\n\n      // review\n      reviewText: 'Had a fantastic time at Spice Garden in Jubilee Hills! The biryani was outstanding and the service made the evening. Lively atmosphere and great value — highly recommend and will be back.',\n      googleStyle: { ...primaryBtn(true, '#4C8BF5') },\n      onRestart: () => this.setState({ screen: 'rating', selected: null, love: {}, issues: {} }),\n\n      // complaint\n      issueChips,\n      sendStyle: primaryBtn(true, accent),\n      onSend: () => this.setState({ screen: 'sent' }),\n\n      // sent\n      doneStyle: { ...primaryBtn(true, accent), width: 'auto', padding: '0 40px', marginTop: '26px' },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
